<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 아이 기관 유형 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF9F0;
  --card: #FFFFFF;
  --type1: #FF6B35;
  --type2: #7B68EE;
  --type3: #2ECC71;
  --type4: #3498DB;
  --text: #2D3436;
  --sub: #636E72;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --radius: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.deco-circle {
  position: fixed;
  border-radius: 50%;
  opacity: 0.08;
  z-index: 0;
  pointer-events: none;
}
.deco-circle.c1 { width: 300px; height: 300px; background: var(--type1); top: -80px; left: -80px; }
.deco-circle.c2 { width: 200px; height: 200px; background: var(--type3); bottom: 10%; right: -60px; }
.deco-circle.c3 { width: 250px; height: 250px; background: var(--type2); bottom: -100px; left: 30%; }

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 24px 20px 60px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeDown 0.6s ease;
}
.header .emoji-row { font-size: 40px; margin-bottom: 8px; }
.header h1 {
  font-family: 'Gaegu', cursive;
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.header p {
  font-size: 14px;
  color: var(--sub);
  margin-top: 6px;
  line-height: 1.6;
}

/* ── Progress ── */
.progress-wrap {
  margin-bottom: 28px;
  animation: fadeDown 0.6s ease 0.1s both;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--sub);
  font-weight: 500;
}
.progress-bar {
  height: 8px;
  background: #E8E4DF;
  border-radius: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--type1), var(--type4));
  border-radius: 8px;
  transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1);
}

/* ── Question Card ── */
.question-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px 24px;
  animation: slideUp 0.45s ease;
}
.q-number {
  display: inline-block;
  background: linear-gradient(135deg, var(--type1), var(--type4));
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 14px;
}
.q-text {
  font-family: 'Gaegu', cursive;
  font-size: 22px;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 24px;
  color: var(--text);
}
.q-scene {
  font-size: 13px;
  color: var(--sub);
  margin-bottom: 20px;
  padding: 10px 14px;
  background: #f8f6f3;
  border-radius: 12px;
  line-height: 1.6;
}

/* ── Options ── */
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: #FAFAF8;
  border: 2px solid transparent;
  border-radius: 14px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: left;
  font-size: 15px;
  line-height: 1.5;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
}
.option-btn:hover {
  border-color: #ddd;
  background: #F5F3EF;
  transform: translateY(-1px);
}
.option-btn:active { transform: scale(0.98); }
.option-btn .opt-emoji {
  font-size: 22px;
  flex-shrink: 0;
  margin-top: 1px;
}
.option-btn.selected {
  border-color: var(--type4);
  background: #EBF5FF;
}

/* ── Result ── */
.result-wrap {
  animation: slideUp 0.5s ease;
}
.result-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 16px;
}
.result-banner {
  padding: 32px 24px 20px;
  text-align: center;
  color: #fff;
  position: relative;
}
.result-banner .r-emoji { font-size: 56px; margin-bottom: 8px; }
.result-banner h2 {
  font-family: 'Gaegu', cursive;
  font-size: 28px;
  font-weight: 700;
}
.result-banner p {
  font-size: 14px;
  opacity: 0.9;
  margin-top: 4px;
}
.result-body { padding: 24px; }
.result-body h3 {
  font-family: 'Gaegu', cursive;
  font-size: 20px;
  margin-bottom: 12px;
}
.result-body p {
  font-size: 14px;
  line-height: 1.8;
  color: var(--sub);
  margin-bottom: 16px;
}
.rec-list {
  list-style: none;
  padding: 0;
}
.rec-list li {
  padding: 10px 14px;
  background: #f8f6f3;
  border-radius: 12px;
  margin-bottom: 8px;
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.rec-list li .li-icon { flex-shrink: 0; }

/* ── Score Bars ── */
.score-section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 16px;
}
.score-section h3 {
  font-family: 'Gaegu', cursive;
  font-size: 20px;
  margin-bottom: 16px;
}
.score-row {
  margin-bottom: 14px;
}
.score-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 6px;
  font-weight: 500;
}
.score-bar-bg {
  height: 10px;
  background: #EEE;
  border-radius: 10px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 1s cubic-bezier(0.25, 1, 0.5, 1);
}

/* ── Buttons ── */
/* ── Nav Bar ── */
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 2px solid #E0DBD5;
  border-radius: 50px;
  background: var(--card);
  color: var(--sub);
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all 0.2s ease;
}
.back-btn:hover { border-color: #bbb; color: var(--text); background: #f5f3ef; }
.back-btn:active { transform: scale(0.96); }
.back-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.back-btn .arrow { font-size: 16px; }
.answered-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ccc;
  margin: 0 2px;
  transition: background 0.3s;
}
.answered-dot.filled { background: var(--type4); }
.answered-dot.current { background: var(--type1); transform: scale(1.3); }

.restart-btn {
  display: block;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: var(--text);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: transform 0.2s, opacity 0.2s;
}
.restart-btn:hover { opacity: 0.85; }
.restart-btn:active { transform: scale(0.97); }

/* ── Child name input ── */
.name-input-wrap {
  text-align: center;
  animation: fadeDown 0.6s ease;
}
.name-input-wrap input {
  font-family: 'Gaegu', cursive;
  font-size: 24px;
  text-align: center;
  border: none;
  border-bottom: 3px dashed #ccc;
  background: transparent;
  padding: 8px 16px;
  outline: none;
  color: var(--text);
  width: 200px;
  transition: border-color 0.3s;
}
.name-input-wrap input:focus { border-color: var(--type4); }
.name-input-wrap input::placeholder { color: #ccc; }
.start-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 48px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--type1), var(--type4));
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  font-family: 'Gaegu', cursive;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(255,107,53,0.3);
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
.start-btn:active { transform: scale(0.96); }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.hidden { display: none !important; }

.site-footer {
  text-align: center;
  padding: 24px 20px 16px;
  font-size: 12px;
  color: #aaa;
  letter-spacing: 0.3px;
}

@keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="deco-circle c1"></div>
<div class="deco-circle c2"></div>
<div class="deco-circle c3"></div>

<div class="container">
  <!-- Intro -->
  <div id="intro">
    <div class="header">
      <div class="emoji-row">🧒🏻✨</div>
      <h1>우리 아이에게 맞는<br>기관 유형 테스트</h1>
      <p>12개 상황 질문으로 아이의 성향을 파악하고<br>어떤 기관이 잘 맞을지 알아보세요</p>
    </div>
    <div class="name-input-wrap">
      <p style="font-size:15px; color:var(--sub); margin-bottom:12px;">아이 이름을 입력해주세요</p>
      <input type="text" id="childName" placeholder="예: 소임" maxlength="10">
      <br>
      <button class="start-btn" id="startBtn" onclick="startTest()">테스트 시작하기 →</button>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz" class="hidden">
    <div class="nav-bar">
      <button class="back-btn" id="backBtn" onclick="goBack()" disabled>
        <span class="arrow">←</span> 이전 질문
      </button>
      <div id="dotIndicator"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progressLabel">질문 1 / 12</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card" id="questionCard"></div>
  </div>

  <!-- Result -->
  <div id="result" class="hidden"></div>
</div>

<footer class="site-footer">
  © 2026 TwoIMs AI (투임즈AI). All rights reserved.

let childName = "";
let currentQ = 0;
let scores = [0, 0, 0, 0]; // type1~4
let answerHistory = []; // stores { qIndex, optIndex } for each answered question

function startTest() {
  childName = document.getElementById("childName").value.trim() || "우리 아이";
  answerHistory = [];
  scores = [0, 0, 0, 0];
  currentQ = 0;
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function updateDots() {
  const container = document.getElementById("dotIndicator");
  container.innerHTML = questions.map((_, i) => {
    let cls = "answered-dot";
    if (i === currentQ) cls += " current";
    else if (i < answerHistory.length) cls += " filled";
    return `<span class="${cls}"></span>`;
  }).join("");
}

function showQuestion() {
  const q = questions[currentQ];
  const pct = Math.round((currentQ / questions.length) * 100);
  document.getElementById("progressLabel").textContent = `질문 ${currentQ + 1} / ${questions.length}`;
  document.getElementById("progressPct").textContent = pct + "%";
  document.getElementById("progressFill").style.width = pct + "%";

  // Back button state
  document.getElementById("backBtn").disabled = currentQ === 0;

  // Dot indicator
  updateDots();

  // Check if this question was previously answered
  const prevAnswer = answerHistory.find(h => h.qIndex === currentQ);

  const card = document.getElementById("questionCard");
  card.style.animation = "none";
  card.offsetHeight; // reflow
  card.style.animation = "slideUp 0.45s ease";

  card.innerHTML = `
    <span class="q-number">Q${currentQ + 1}</span>
    <div class="q-text">${q.q}</div>
    <div class="q-scene">${q.scene}</div>
    <div class="options">
      ${q.opts.map((o, i) => `
        <button class="option-btn${prevAnswer && prevAnswer.optIndex === i ? ' selected' : ''}" onclick="selectAnswer(${i})">
          <span class="opt-emoji">${o.emoji}</span>
          <span>${o.text}</span>
        </button>
      `).join("")}
    </div>
  `;
}

function selectAnswer(idx) {
  // If re-answering a previous question, remove old answer's scores
  const existingIdx = answerHistory.findIndex(h => h.qIndex === currentQ);
  if (existingIdx !== -1) {
    const oldOpt = answerHistory[existingIdx].optIndex;
    const oldScores = questions[currentQ].opts[oldOpt].scores;
    scores = scores.map((v, i) => v - oldScores[i]);
    // Remove this and all subsequent answers (re-branching)
    const removed = answerHistory.splice(existingIdx);
    removed.forEach(h => {
      if (h.qIndex !== currentQ) {
        const s = questions[h.qIndex].opts[h.optIndex].scores;
        scores = scores.map((v, i) => v - s[i]);
      }
    });
  }

  // Add new answer
  const s = questions[currentQ].opts[idx].scores;
  scores = scores.map((v, i) => v + s[i]);
  answerHistory.push({ qIndex: currentQ, optIndex: idx });

  const btns = document.querySelectorAll(".option-btn");
  btns.forEach(b => b.style.pointerEvents = "none");
  btns[idx].classList.add("selected");

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 400);
}

function goBack() {
  if (currentQ === 0) return;
  currentQ--;
  showQuestion();
}

function showResult() {
  document.getElementById("quiz").classList.add("hidden");
  const resultDiv = document.getElementById("result");
  resultDiv.classList.remove("hidden");

  const maxScore = Math.max(...scores);
  const topIdx = scores.indexOf(maxScore);
  const total = scores.reduce((a, b) => a + b, 0);
  const t = typeInfo[topIdx];

  // Secondary type
  const sortedIdxs = [...scores.keys()].sort((a, b) => scores[b] - scores[a]);
  const secondIdx = sortedIdxs[1];
  const secondType = typeInfo[secondIdx];
  const hasSecond = scores[secondIdx] >= maxScore * 0.7;

  resultDiv.innerHTML = `
    <div class="result-wrap">
      <div class="result-card">
        <div class="result-banner" style="background:${t.gradient}">
          <div class="r-emoji">${t.emoji}</div>
          <h2>${childName}은(는) ${t.tag}</h2>
          <p>${t.name}</p>
        </div>
        <div class="result-body">
          <h3>💡 이런 성향이에요</h3>
          <p>${t.desc}</p>
          ${hasSecond ? `<p style="background:#f8f6f3;padding:12px 14px;border-radius:12px;"><strong>${secondType.tag}</strong> 성향도 함께 가지고 있어요! 두 가지 특성을 모두 고려해서 기관을 선택하면 좋겠어요.</p>` : ""}
          <h3 style="margin-top:20px">🏫 이런 기관을 찾아보세요</h3>
          <ul class="rec-list">
            ${t.recs.map(r => `<li><span class="li-icon">${r.icon}</span> ${r.text}</li>`).join("")}
          </ul>
        </div>
      </div>

      <div class="score-section">
        <h3>📊 ${childName}의 유형별 성향 분석</h3>
        ${typeInfo.map((tp, i) => {
          const pct = total > 0 ? Math.round((scores[i] / total) * 100) : 0;
          return `
            <div class="score-row">
              <div class="score-label">
                <span>${tp.tag} ${tp.name}</span>
                <span style="color:${tp.color};font-weight:700">${pct}%</span>
              </div>
              <div class="score-bar-bg">
                <div class="score-bar-fill" style="width:0%;background:${tp.gradient}" data-target="${pct}"></div>
              </div>
            </div>
          `;
        }).join("")}
      </div>

      <button class="restart-btn" onclick="restart()">🔄 다시 테스트하기</button>
    </div>
  `;

  // Animate score bars
  setTimeout(() => {
    document.querySelectorAll(".score-bar-fill").forEach(bar => {
      bar.style.width = bar.dataset.target + "%";
    });
  }, 200);
}

function restart() {
  currentQ = 0;
  scores = [0, 0, 0, 0];
  answerHistory = [];
  document.getElementById("result").classList.add("hidden");
  document.getElementById("result").innerHTML = "";
  document.getElementById("intro").classList.remove("hidden");
}

// Enter key to start
document.getElementById("childName").addEventListener("keydown", e => {
  if (e.key === "Enter") startTest();
});
</script>
